version: '3.9'
services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rag"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/rag
      MODEL_NAME: gpt-4o-mini
      EMBEDDING_MODEL: text-embedding-3-small
      CORS_ORIGINS: http://localhost:5173
      LOG_LEVEL: INFO
      AUTH_REQUIRED: ${AUTH_REQUIRED:-true}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-50}
      DEFAULT_RATE_LIMIT: ${DEFAULT_RATE_LIMIT:-120/minute}
      AUTH_RATE_LIMIT: ${AUTH_RATE_LIMIT:-20/minute}
      CHAT_RATE_LIMIT: ${CHAT_RATE_LIMIT:-60/minute}
      UPLOAD_RATE_LIMIT: ${UPLOAD_RATE_LIMIT:-10/minute}
      POOL_SIZE: ${POOL_SIZE:-20}
      MAX_OVERFLOW: ${MAX_OVERFLOW:-10}
      POOL_TIMEOUT_SECONDS: ${POOL_TIMEOUT_SECONDS:-30}
      POOL_RECYCLE_SECONDS: ${POOL_RECYCLE_SECONDS:-1800}
      IVFFLAT_LISTS: ${IVFFLAT_LISTS:-100}
      HEALTH_OPENAI_TIMEOUT_SECONDS: ${HEALTH_OPENAI_TIMEOUT_SECONDS:-8}
      API_VERSION_PREFIX: ${API_VERSION_PREFIX:-/v1}
      DB_AUTH_ENABLED: ${DB_AUTH_ENABLED:-true}
      API_KEY_PREFIX: ${API_KEY_PREFIX:-rk_}
      DEFAULT_USER_QUOTA_PER_MONTH: ${DEFAULT_USER_QUOTA_PER_MONTH:-10000}
      DEFAULT_API_KEY_QUOTA_PER_MONTH: ${DEFAULT_API_KEY_QUOTA_PER_MONTH:-5000}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-}
      OIDC_JWKS_URL: ${OIDC_JWKS_URL:-}
      OIDC_CLAIM_USERNAME: ${OIDC_CLAIM_USERNAME:-email}
      OIDC_CLAIM_ROLE: ${OIDC_CLAIM_ROLE:-role}
      OIDC_CLAIM_COLLECTIONS: ${OIDC_CLAIM_COLLECTIONS:-collections}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      DATA_SOVEREIGNTY_MODE: ${DATA_SOVEREIGNTY_MODE:-false}
      LOCAL_PROVIDER_API_KEY: ${LOCAL_PROVIDER_API_KEY:-local-inference}
      LOCAL_LLM_BASE_URL: ${LOCAL_LLM_BASE_URL:-http://localhost:11434/v1}
      LOCAL_LLM_MODEL_DEFAULT: ${LOCAL_LLM_MODEL_DEFAULT:-llama3.1:8b-instruct-q4_K_M}
      LOCAL_LLM_MODEL_FI: ${LOCAL_LLM_MODEL_FI:-poro-34b-chat}
      LOCAL_EMBEDDING_BASE_URL: ${LOCAL_EMBEDDING_BASE_URL:-http://localhost:11434/v1}
      LOCAL_EMBEDDING_MODEL: ${LOCAL_EMBEDDING_MODEL:-nomic-embed-text}
      TURKUNLP_EMBEDDING_URL: ${TURKUNLP_EMBEDDING_URL:-}
      TURKUNLP_EMBEDDING_API_KEY: ${TURKUNLP_EMBEDDING_API_KEY:-}
      CONNECTOR_FETCH_TIMEOUT_SECONDS: ${CONNECTOR_FETCH_TIMEOUT_SECONDS:-20}
      CONNECTOR_MAX_SOURCES_PER_IMPORT: ${CONNECTOR_MAX_SOURCES_PER_IMPORT:-20}
      CONNECTOR_ALLOWED_DOMAINS: ${CONNECTOR_ALLOWED_DOMAINS:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000/v1
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173 >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  pgdata:
