name: CI

on:
  push:
    branches: ["main", "work", "feature/**", "fix/**"]
  pull_request:

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Pytest
        run: |
          cd backend
          PYTHONPATH=. pytest -q
      - name: Mypy
        run: |
          cd backend
          PYTHONPATH=. mypy app
